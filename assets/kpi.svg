<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%" role="img" aria-label="Key metrics">
  <defs>
    <linearGradient id="kbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1015"/>
      <stop offset="100%" stop-color="#15161e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="200" fill="url(#kbg)"/>

  <!-- column dividers -->
  <line x1="300" y1="20" x2="300" y2="180" stroke="#292e42" stroke-width="1"/>
  <line x1="600" y1="20" x2="600" y2="180" stroke="#292e42" stroke-width="1"/>
  <line x1="900" y1="20" x2="900" y2="180" stroke="#292e42" stroke-width="1"/>

  <!-- 1. years -->
  <text x="150" y="42" font-family="'JetBrains Mono', monospace" font-size="11" fill="#565f89" letter-spacing="3" text-anchor="middle">01 — TENURE</text>
  <text x="150" y="125" font-family="'JetBrains Mono', monospace" font-weight="800" font-size="84" fill="#c0caf5" letter-spacing="-2" text-anchor="middle">10<tspan fill="#7aa2f7">+</tspan></text>
  <text x="150" y="160" font-family="'JetBrains Mono', monospace" font-size="11" fill="#9aa5ce" letter-spacing="3" text-anchor="middle">YEARS ISP-GRADE</text>

  <!-- 2. publications -->
  <text x="450" y="42" font-family="'JetBrains Mono', monospace" font-size="11" fill="#565f89" letter-spacing="3" text-anchor="middle">02 — RESEARCH</text>
  <text x="450" y="125" font-family="'JetBrains Mono', monospace" font-weight="800" font-size="84" fill="#c0caf5" letter-spacing="-2" text-anchor="middle">03</text>
  <text x="450" y="160" font-family="'JetBrains Mono', monospace" font-size="11" fill="#9aa5ce" letter-spacing="3" text-anchor="middle">PUBLICATIONS · 2022</text>

  <!-- 3. roles -->
  <text x="750" y="42" font-family="'JetBrains Mono', monospace" font-size="11" fill="#565f89" letter-spacing="3" text-anchor="middle">03 — DEPLOYMENTS</text>
  <text x="750" y="125" font-family="'JetBrains Mono', monospace" font-weight="800" font-size="84" fill="#c0caf5" letter-spacing="-2" text-anchor="middle">02</text>
  <text x="750" y="160" font-family="'JetBrains Mono', monospace" font-size="11" fill="#9aa5ce" letter-spacing="3" text-anchor="middle">PRODUCTION ROLES</text>

  <!-- 4. status -->
  <text x="1050" y="42" font-family="'JetBrains Mono', monospace" font-size="11" fill="#565f89" letter-spacing="3" text-anchor="middle">04 — AVAILABILITY</text>
  <circle cx="1010" cy="105" r="8" fill="#9ece6a"/>
  <text x="1050" y="113" font-family="'JetBrains Mono', monospace" font-weight="800" font-size="36" fill="#9ece6a" letter-spacing="-1" text-anchor="start">OPEN</text>
  <text x="1050" y="160" font-family="'JetBrains Mono', monospace" font-size="11" fill="#9aa5ce" letter-spacing="3" text-anchor="middle">REMOTE · WORLDWIDE</text>
</svg>
